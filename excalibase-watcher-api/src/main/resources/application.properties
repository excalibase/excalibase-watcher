# ── Postgres (WAL / pgoutput) ──────────────────────────────────────────────
app.cdc.postgres.enabled=true
app.cdc.postgres.url=jdbc:postgresql://localhost:5432/excalibase
app.cdc.postgres.username=postgres
app.cdc.postgres.password=postgres
app.cdc.slot-name=watcher_slot
app.cdc.publication-name=watcher_pub
app.cdc.create-slot-if-not-exists=true
app.cdc.create-publication-if-not-exists=true

# ── MySQL (binlog replication) ─────────────────────────────────────────────
app.cdc.mysql.enabled=true
app.cdc.mysql.url=jdbc:mysql://localhost:3306/excalibase
app.cdc.mysql.username=root
app.cdc.mysql.password=secret
# app.cdc.mysql.offset-store.file=/var/lib/watcher/binlog.offset

# ── NATS JetStream ─────────────────────────────────────────────────────────
app.nats.url=nats://localhost:4222
app.nats.stream-name=CDC
app.nats.subject-prefix=cdc
app.nats.storage=memory
app.nats.max-age-minutes=60
app.nats.enabled=true

# ── Spring ─────────────────────────────────────────────────────────────────
# Fallback datasource (required by Spring Boot autoconfiguration machinery)
# Override with app.cdc.postgres.url / app.cdc.mysql.url above
spring.datasource.url=jdbc:postgresql://localhost:5432/excalibase
spring.datasource.username=postgres
spring.datasource.password=postgres

# ── Actuator ──────────────────────────────────────────────────────────────
server.port=8080
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
