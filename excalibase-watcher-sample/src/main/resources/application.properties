# PostgreSQL — matches docker-compose.yml
spring.datasource.url=jdbc:postgresql://localhost:5432/excalibase
spring.datasource.username=postgres
spring.datasource.password=postgres

# CDC (Postgres WAL)
app.cdc.enabled=true
app.cdc.slot-name=excalibase_sample_slot
app.cdc.publication-name=excalibase_sample_pub
app.cdc.create-slot-if-not-exists=true
app.cdc.create-publication-if-not-exists=true

# NATS JetStream — matches docker-compose.yml
app.nats.url=nats://localhost:4222
app.nats.stream-name=CDC
app.nats.subject-prefix=cdc
app.nats.storage=memory
app.nats.max-age-minutes=60
app.nats.enabled=true

spring.main.web-application-type=none
