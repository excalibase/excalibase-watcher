name: Continuous Integration

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'helm/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'helm/**'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Verify modules
      run: go mod verify

    - name: Vet
      run: go vet ./...

    - name: Build
      run: go build ./...

    - name: Test with coverage
      run: go test -race -count=1 -coverprofile=coverage.out ./...

    - name: Coverage summary
      run: go tool cover -func=coverage.out | tail -1
