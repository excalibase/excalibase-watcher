name: End-to-End Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
  workflow_dispatch:

env:
  MAVEN_OPTS: "-Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

jobs:
  postgres-e2e:
    name: Postgres E2E Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Run Postgres E2E tests
      run: |
        mvn verify -pl excalibase-watcher-api --also-make \
          -Dtest="PostgresE2EIT" \
          -DfailIfNoTests=false \
          ${{ env.MAVEN_CLI_OPTS }}

    - name: Upload test reports on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: postgres-e2e-reports
        path: excalibase-watcher-api/target/surefire-reports/
        retention-days: 3
        if-no-files-found: ignore

  mysql-e2e:
    name: MySQL E2E Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Run MySQL E2E tests
      run: |
        mvn verify -pl excalibase-watcher-api --also-make \
          -Dtest="MysqlE2EIT" \
          -DfailIfNoTests=false \
          ${{ env.MAVEN_CLI_OPTS }}

    - name: Upload test reports on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: mysql-e2e-reports
        path: excalibase-watcher-api/target/surefire-reports/
        retention-days: 3
        if-no-files-found: ignore
