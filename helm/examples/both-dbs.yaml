# Example: Watch both PostgreSQL and MySQL simultaneously
# helm install watcher helm/excalibase-watcher-go/ -f helm/examples/both-dbs.yaml

postgres:
  enabled: true
  url: "postgres://postgres-service:5432/mydb?replication=database"
  existingSecret: "pg-credentials"
  existingSecretUsernameKey: "username"
  existingSecretPasswordKey: "password"
  captureDdl: true
  snapshotMode: "chunked"

mysql:
  enabled: true
  host: "mysql-service:3306"
  existingSecret: "mysql-credentials"
  existingSecretUsernameKey: "username"
  existingSecretPasswordKey: "password"
  schema: "mydb"
  tables:
    - orders
    - products

nats:
  url: "nats://nats-service:4222"
  storage: "file"
  maxAgeMinutes: 1440

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi
