sonar.organization=excalibase
sonar.projectKey=excalibase_excalibase-watcher
sonar.projectName=excalibase-watcher

sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**,**/testdata/**,e2e/**,bin/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**

sonar.go.coverage.reportPaths=coverage.out

sonar.sourceEncoding=UTF-8

sonar.coverage.exclusions=main.go,**/cmd/**,**/*_test.go
